name: Weekly TikTok Trending Sounds

# Runs Monday 5AM UTC = 8AM EAT (BEFORE the render workflow at 4PM UTC)
# Tries multiple TikTok data sources with fallbacks
# Saves trending-sounds.json for Groq to use in script generation
# Sends top 5 via ntfy

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

jobs:
  trending:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch TikTok trending sounds (multi-source with fallbacks)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          node << 'TRENDINGEOF'
          const https = require('https');
          const http  = require('http');
          const fs    = require('fs');

          const NTFY = process.env.NTFY_TOPIC || '';

          function safeTitle(s) {
            return (s || '').replace(/[^\x20-\x7E]/g, '').replace(/\s+/g, ' ').trim().slice(0, 100);
          }

          // Multiple endpoints -- TikTok rotates these, we try all
          const ENDPOINTS = [
            'https://ads.tiktok.com/creative_radar_api/v1/popular_trend/music/list?period=7&page=1&limit=10',
            'https://www.tiktok.com/api/recommend/item_list/?count=10&sourceType=12',
          ];

          const HEADERS = {
            'User-Agent':      'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0.0.0 Safari/537.36',
            'Accept':          'application/json, text/plain, */*',
            'Accept-Language': 'en-US,en;q=0.9',
            'Referer':         'https://ads.tiktok.com/',
            'sec-ch-ua':       '"Chromium";v="122", "Not(A:Brand";v="24"',
          };

          function fetchJSON(url) {
            return new Promise(function(resolve, reject) {
              const lib = url.startsWith('https') ? https : http;
              lib.get(url, { headers: HEADERS }, function(res) {
                if (res.statusCode === 301 || res.statusCode === 302) {
                  return fetchJSON(res.headers.location).then(resolve).catch(reject);
                }
                let data = '';
                res.on('data', function(d) { data += d; });
                res.on('end', function() {
                  try { resolve({ status: res.statusCode, data: JSON.parse(data) }); }
                  catch(e) { reject(new Error('Not JSON (HTTP ' + res.statusCode + '): ' + data.slice(0, 100))); }
                });
              }).on('error', reject);
            });
          }

          function sendNtfy(message, title) {
            if (!NTFY) return Promise.resolve();
            const data = Buffer.from(message);
            return new Promise(function(resolve) {
              const req = https.request({
                hostname: 'ntfy.sh', port: 443, path: '/' + NTFY, method: 'POST',
                headers: {
                  'Content-Type': 'text/plain', 'Content-Length': data.length,
                  'Title': safeTitle(title), 'Tags': 'musical_note', 'Priority': 'default',
                },
              }, function(res) { console.log('ntfy: ' + res.statusCode); resolve(); });
              req.on('error', function() { resolve(); });
              req.write(data); req.end();
            });
          }

          function extractSounds(data) {
            // Try multiple response shapes
            var items = [];
            if (data && data.data && data.data.list)        items = data.data.list;
            else if (data && data.music_list)               items = data.music_list;
            else if (data && data.data && data.data.music_list) items = data.data.music_list;
            else if (data && Array.isArray(data.data))      items = data.data;
            return items;
          }

          (async function() {
            var sounds = [];
            var source = 'unknown';

            for (var i = 0; i < ENDPOINTS.length; i++) {
              var url = ENDPOINTS[i];
              try {
                console.log('Trying: ' + url.split('?')[0]);
                var result = await fetchJSON(url);
                var items  = extractSounds(result.data);
                if (items.length > 0) {
                  sounds = items.slice(0, 10).map(function(item, idx) {
                    return {
                      rank:       idx + 1,
                      title:      (item.music_info && item.music_info.title)  || item.title  || ('Trending #' + (idx + 1)),
                      artist:     (item.music_info && item.music_info.author) || item.author || 'Unknown',
                      usageCount: item.post_num || item.use_count || '--',
                      soundId:    item.music_id || item.id || null,
                      scrapedAt:  new Date().toISOString(),
                      week:       new Date().toISOString().slice(0, 10),
                    };
                  });
                  source = url.split('?')[0];
                  console.log('Got ' + sounds.length + ' sounds from: ' + source);
                  break;
                } else {
                  console.log('Empty response from: ' + url.split('?')[0]);
                }
              } catch(e) {
                console.log('Endpoint failed: ' + e.message);
              }
            }

            // If all endpoints fail, use curated finance-friendly fallback list
            // These are evergreen sounds that work for finance content
            if (sounds.length === 0) {
              console.log('All TikTok endpoints failed -- using curated fallback list');
              sounds = [
                { rank:1, title:'Monkeys Spinning Monkeys', artist:'Kevin MacLeod', usageCount:'high', soundId:null, scrapedAt:new Date().toISOString(), week:new Date().toISOString().slice(0,10), note:'Fallback -- check TikTok manually' },
                { rank:2, title:'original sound - finance', artist:'trending creator', usageCount:'--', soundId:null, scrapedAt:new Date().toISOString(), week:new Date().toISOString().slice(0,10), note:'Fallback' },
              ];
              source = 'fallback';
            }

            // Save to file
            const output = {
              updatedAt: new Date().toISOString(),
              source:    source,
              sounds:    sounds,
            };
            fs.writeFileSync('trending-sounds.json', JSON.stringify(output, null, 2));
            console.log('Saved trending-sounds.json (' + sounds.length + ' sounds)');

            // Build message
            const today = new Date().toISOString().slice(0, 10);
            const lines = [
              'DWB Trending Sounds -- ' + today,
              source === 'fallback' ? '(TikTok API unavailable -- check manually)' : 'Source: TikTok Ads Creative Center',
              '',
            ];
            sounds.slice(0, 5).forEach(function(s) {
              lines.push(s.rank + '. ' + s.title + ' - ' + s.artist + ' (' + s.usageCount + ' videos)');
            });
            lines.push('');
            lines.push('Use these in TikTok editor for your short-form posts.');

            const message = lines.join('\n');
            console.log('\n' + message);

            await sendNtfy(message, 'DWB Trending Sounds ' + today);
            console.log('Trending sounds workflow complete');
          })();
          TRENDINGEOF

      - name: Commit trending sounds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add trending-sounds.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update trending TikTok sounds [skip ci]"
          git push || true
